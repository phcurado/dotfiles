## Terminal colors
# set-option -g default-terminal "tmux-256color"
# set -as terminal-features ",*:RGB"

set-option -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"

# Rules required by yazi for image preview
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# nvim :checkhealth recommendation
set-option -g focus-events on

# Increase history limit
set-option -g history-limit 5000

# source .tmux.conf file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Configuration Reloaded!"


## Leader remap

# remap 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix


## Pane customizations

# Vim mode keys and enabling mouse
set-window-option -g mode-keys vi
set -g mouse on

# Reworder window when one is deleted
set-option -g renumber-windows on

# Required by pi.dev
set -g extended-keys on
set -g extended-keys-format csi-u

# vim like move around split windows
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# vim like on copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# change pane size with ALT + arrow keys
bind-key -n M-Left resize-pane -L 10
bind-key -n M-Right resize-pane -R 10
bind-key -n M-Down resize-pane -D 10
bind-key -n M-Up resize-pane -U 10

bind \` if-shell -F '#{m:popup-*,#{session_name}}' '' 'display-popup -E -d "#{pane_current_path}" -w 90% -h 85% "tmux new-session -A -s popup-#{b:pane_current_path} -c \"#{pane_current_path}\""'

# pane index and copy to clipboard
set -g base-index 1
set -g pane-base-index 1
set-option -g set-clipboard on

# use current pane path when creating windows
bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind  a  run-shell -b '~/.local/bin/tmux-agent-sidebar #{window_id} #{q:pane_current_path}'
bind  A  run-shell -b '~/.local/bin/tmux-agent-fullscreen #{window_id} #{q:pane_current_path}'
bind  t  run-shell -b '~/.local/bin/tmux-bottom-terminal #{window_id} #{q:pane_current_path}'
bind  T  run-shell -b '~/.local/bin/tmux-bottom-fullscreen #{window_id} #{q:pane_current_path}'

# Swap windows
bind-key -n C-S-l swap-window -t +1\; select-window -t +1
bind-key -n C-S-h swap-window -t -1\; select-window -t -1

# buffer
bind Space choose-buffer

# Removing escape time delay
set -s escape-time 0

# Customize status line
set -g status-interval 1
set-window-option -g window-status-style fg='#858585'
set-window-option -g status-position top               # statusbar position
set -g window-status-format '#[fg=#777777] #I:#(pwd="#{pane_current_path}"; echo ${pwd####*/}) '
set -g window-status-current-format '#[fg=#8caaee,bold] #I:#(pwd="#{pane_current_path}"; echo ${pwd####*/}) #[default]'
set -g pane-border-style fg='#51576d'
set -g pane-active-border-style fg='#a6d189,bold'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=#232634,bg=#a6d189,bold] #{pane_index} #[default],#[fg=#858585] #{pane_index} #[default]}'
set -g status-right-length 120
set -g status-right '#(command -v weather >/dev/null 2>&1 && weather widget || echo "")  %I:%M %p  %a %b %d #{?client_prefix,  ,  }'
set-option -g status-style bg=default

# TPM - Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# List of plugins
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.config/tmux/plugins/tpm/tpm'

bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-selection
