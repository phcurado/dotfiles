# jj repos show [custom.jj]; git builtins are disabled and re-shown via wrappers only outside jj.
[custom.jj]
description = "jj status"
when = "jj --ignore-working-copy root"
symbol = "ЁЯеЛ "
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --color always --limit 1 --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    "|",
    concat(
      if(conflict, "ЁЯТе"),
      if(divergent, "ЁЯЪз"),
      if(hidden, "ЁЯС╗"),
      if(immutable, "ЁЯФТ"),
    ),
    raw_escape_sequence("\x1b[1;32m") ++ if(empty, "(empty)"),
    raw_escape_sequence("\x1b[1;32m") ++ coalesce(
      truncate_end(29, description.first_line(), "тАж"),
      "(no description set)",
    ) ++ raw_escape_sequence("\x1b[0m"),
  )
'
'''

[git_status]
disabled = true

[git_metrics]
disabled = true

[custom.git_branch]
when = "! jj --ignore-working-copy root"
require_repo = true
command = "starship module git_branch"
style = ""

[custom.git_commit]
when = "! jj --ignore-working-copy root"
require_repo = true
command = "starship module git_commit"
style = ""

[custom.git_status]
when = "! jj --ignore-working-copy root"
require_repo = true
command = "starship module git_status"
style = ""

[custom.git_metrics]
when = "! jj --ignore-working-copy root"
require_repo = true
command = "starship module git_metrics"
style = ""

